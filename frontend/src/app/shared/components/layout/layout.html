<header class="bg-white shadow-md border-b">
  <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center">
    <!-- Logo + título -->
    <div class="flex gap-3 items-center mb-4 sm:mb-0">
      <span class="text-3xl">💳</span>
      <div>
        <h1 class="font-bold text-xl text-gray-800">Credit Request System</h1>
        <p class="text-sm text-gray-500">Credit Management Platform</p>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-center">
      <!-- Links se apilan en mobile y se alinean en fila en pantallas grandes -->
      <a routerLink="/requests" class="text-gray-600 hover:text-blue-600 transition font-medium">
        Solicitudes
      </a>
      <a routerLink="/create" class="text-gray-600 hover:text-blue-600 transition font-medium">
        Nuevo Crédito
      </a>
      <button (click)="logout()"
        class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-red-400 transition">
        Cerrar sesión
      </button>
    </nav>
  </div>
</header>

<main class="max-w-7xl mx-auto p-24">
  <ng-content></ng-content>
</main>
