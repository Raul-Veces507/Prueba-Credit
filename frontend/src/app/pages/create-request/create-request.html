


<div class="max-w-3xl mx-auto p-8 bg-white shadow-lg rounded-xl border border-gray-200">
  <!-- Encabezado -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold text-gray-800">📋 Crear Nuevo Crédito</h2>
  </div>

  <!-- Formulario -->
  <form [formGroup]="form" (ngSubmit)="save()" class="space-y-5">
    <!-- Cedula -->
    <div>
      <label for="applicantId" class="block text-sm font-medium text-gray-700 mb-2">Cédula</label>
      <input id="applicantId" formControlName="applicantId" placeholder="Ej: 8-123-456"
        class="w-full rounded-md border border-gray-300 bg-white py-3 px-4 text-sm text-gray-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" />
    </div>

    <!-- Monto -->
    <div>
      <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">Monto</label>
      <input id="amount" type="number" formControlName="amount" placeholder="Ej: 1500.00"
        class="w-full rounded-md border border-gray-300 bg-white py-3 px-4 text-sm text-gray-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" />
    </div>

    <!-- Plazo -->
    <div>
      <label for="termMonths" class="block text-sm font-medium text-gray-700 mb-2">Plazo (meses)</label>
      <input id="termMonths" type="number" formControlName="termMonths" placeholder="Ej: 12"
        class="w-full rounded-md border border-gray-300 bg-white py-3 px-4 text-sm text-gray-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500" />
    </div>

    <!-- Botón -->
    <div>
      <button type="submit"
        class="w-full rounded-md bg-blue-600 py-3 px-6 text-center text-sm font-semibold text-white hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-400">
        Guardar
      </button>
    </div>
  </form>
</div>
